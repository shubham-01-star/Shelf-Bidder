name: Deploy to Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests before deployment'
        required: false
        default: 'false'

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '18.x'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: coverage/

  deploy-infrastructure:
    name: Deploy Infrastructure to Staging
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    permissions:
      id-token: write
      contents: read

    outputs:
      api-url: ${{ steps.stack-outputs.outputs.api-url }}
      user-pool-id: ${{ steps.stack-outputs.outputs.user-pool-id }}
      user-pool-client-id: ${{ steps.stack-outputs.outputs.user-pool-client-id }}
      photo-bucket: ${{ steps.stack-outputs.outputs.photo-bucket }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      - name: CDK Synth
        working-directory: infrastructure
        run: npx cdk synth ShelfBidderStagingStack

      - name: CDK Deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy ShelfBidderStagingStack \
            --require-approval never \
            --outputs-file outputs.json

      - name: Extract stack outputs
        id: stack-outputs
        working-directory: infrastructure
        run: |
          API_URL=$(jq -r '.ShelfBidderStagingStack.ApiUrl' outputs.json)
          USER_POOL_ID=$(jq -r '.ShelfBidderStagingStack.UserPoolId' outputs.json)
          USER_POOL_CLIENT_ID=$(jq -r '.ShelfBidderStagingStack.UserPoolClientId' outputs.json)
          PHOTO_BUCKET=$(jq -r '.ShelfBidderStagingStack.PhotoBucketName' outputs.json)

          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT
          echo "photo-bucket=$PHOTO_BUCKET" >> $GITHUB_OUTPUT

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v3
        with:
          name: cdk-outputs
          path: infrastructure/outputs.json

  deploy-application:
    name: Deploy Application to Staging
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.deploy-infrastructure.outputs.api-url }}
          NEXT_PUBLIC_USER_POOL_ID: ${{ needs.deploy-infrastructure.outputs.user-pool-id }}
          NEXT_PUBLIC_USER_POOL_CLIENT_ID: ${{ needs.deploy-infrastructure.outputs.user-pool-client-id }}
          NEXT_PUBLIC_AWS_REGION: ${{ env.AWS_REGION }}
          NEXT_PUBLIC_PHOTO_BUCKET_NAME: ${{ needs.deploy-infrastructure.outputs.photo-bucket }}
          NEXT_PUBLIC_ENVIRONMENT: staging
        run: npm run build

      - name: Deploy to Vercel (Staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel deploy --prod \
            --token=$VERCEL_TOKEN \
            --env NEXT_PUBLIC_API_URL=${{ needs.deploy-infrastructure.outputs.api-url }} \
            --env NEXT_PUBLIC_USER_POOL_ID=${{ needs.deploy-infrastructure.outputs.user-pool-id }} \
            --env NEXT_PUBLIC_USER_POOL_CLIENT_ID=${{ needs.deploy-infrastructure.outputs.user-pool-client-id }} \
            --env NEXT_PUBLIC_AWS_REGION=${{ env.AWS_REGION }} \
            --env NEXT_PUBLIC_PHOTO_BUCKET_NAME=${{ needs.deploy-infrastructure.outputs.photo-bucket }} \
            --env NEXT_PUBLIC_ENVIRONMENT=staging

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-application]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        env:
          STAGING_API_URL: ${{ needs.deploy-infrastructure.outputs.api-url }}
          STAGING_USER_POOL_ID: ${{ needs.deploy-infrastructure.outputs.user-pool-id }}
          STAGING_USER_POOL_CLIENT_ID: ${{ needs.deploy-infrastructure.outputs.user-pool-client-id }}
          STAGING_PHOTO_BUCKET: ${{ needs.deploy-infrastructure.outputs.photo-bucket }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: npm run test:smoke

      - name: Upload smoke test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: smoke-test-results
          path: test-results/

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-application, smoke-tests]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.smoke-tests.result == 'success'
        run: |
          echo "✅ Staging deployment successful!"
          echo "API URL: ${{ needs.deploy-infrastructure.outputs.api-url }}"

      - name: Deployment Failed
        if: needs.smoke-tests.result != 'success'
        run: |
          echo "❌ Staging deployment failed!"
          exit 1
