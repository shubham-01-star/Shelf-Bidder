version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: shelfbidder-postgres
    environment:
      POSTGRES_DB: shelfbidder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shelfbidder-network

  # pgAdmin (Optional - for database management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shelfbidder-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shelfbidder.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - shelfbidder-network

  # Next.js App (VPS simulation)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: shelfbidder-app
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shelfbidder
      DB_USER: postgres
      DB_PASSWORD: postgres_dev_password
      DB_SSL: "false"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shelfbidder-network
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  shelfbidder-network:
    driver: bridge
