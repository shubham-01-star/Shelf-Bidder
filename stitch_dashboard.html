<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Shelf-Bidder Shopkeeper Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-kirana: #11d452;
            --radius-round-twelve: 0.75rem;}
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8faf9;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        .round-twelve {
            border-radius: var(--radius-round-twelve);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "kirana-green": "#11d452",
                    },
                    borderRadius: {
                        'twelve': '0.75rem',
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-slate-900 min-h-screen flex flex-col">
<header class="p-6 pt-12 flex items-center justify-between">
<div>
<h1 class="text-3xl font-bold tracking-tight text-slate-800">Good Morning 👋</h1>
<p class="text-2xl font-bold text-kirana-green">Ramesh ji</p>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-twelve bg-kirana-green/10 text-kirana-green active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl font-bold">refresh</span>
</button>
</header>
<main class="flex-1 px-6 space-y-8">
<div class="bg-kirana-green rounded-twelve p-6 shadow-xl shadow-kirana-green/20 relative overflow-hidden">
<div class="relative z-10">
<p class="text-white/80 font-medium text-lg">Total Balance</p>
<h2 class="text-white text-5xl font-bold mt-1 tracking-tight">₹1,245</h2>
<div class="mt-8 flex items-center justify-between">
<p class="text-white/90 font-medium">Ready to withdraw</p>
<button class="bg-white text-kirana-green px-6 py-2.5 rounded-twelve font-bold text-lg shadow-sm active:bg-slate-50">
                        Withdraw
                    </button>
</div>
</div>
<div class="absolute -right-8 -top-8 w-40 h-40 bg-white/10 rounded-full"></div>
<div class="absolute -left-12 -bottom-12 w-32 h-32 bg-black/5 rounded-full"></div>
</div>
<section>
<h3 class="text-xl font-bold mb-4 px-1 text-slate-700">Quick Actions</h3>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-4 bg-white p-8 rounded-twelve border-2 border-slate-50 shadow-sm active:bg-kirana-green/5 active:border-kirana-green transition-all group">
<div class="w-16 h-16 bg-kirana-green/10 text-kirana-green rounded-full flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl filled-icon">photo_camera</span>
</div>
<span class="text-lg font-bold text-slate-800">Scan Shelf</span>
</button>
<button class="flex flex-col items-center justify-center gap-4 bg-white p-8 rounded-twelve border-2 border-slate-50 shadow-sm active:bg-kirana-green/5 active:border-kirana-green transition-all group">
<div class="w-16 h-16 bg-kirana-green/10 text-kirana-green rounded-full flex items-center justify-center group-active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl filled-icon">assignment</span>
</div>
<span class="text-lg font-bold text-slate-800">Active Tasks</span>
</button>
</div>
</section>
<section class="pb-10">
<div class="flex items-center justify-between mb-4 px-1">
<h3 class="text-xl font-bold text-slate-700">Today's Activity</h3>
<span class="text-sm font-semibold text-kirana-green">View All</span>
</div>
<div class="space-y-3">
<div class="flex items-center gap-4 bg-white p-4 rounded-twelve shadow-sm border border-slate-50">
<div class="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined filled-icon">check_circle</span>
</div>
<div class="flex-1">
<p class="text-lg font-semibold text-slate-800">Tasks Completed</p>
</div>
<span class="text-xl font-bold text-slate-400">2</span>
</div>
<div class="flex items-center gap-4 bg-white p-4 rounded-twelve shadow-sm border border-slate-50">
<div class="w-12 h-12 bg-kirana-green/10 text-kirana-green rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">gavel</span>
</div>
<div class="flex-1">
<p class="text-lg font-semibold text-slate-800">Active Auctions</p>
</div>
<span class="text-xl font-bold text-slate-400">1</span>
</div>
<div class="flex items-center gap-4 bg-white p-4 rounded-twelve shadow-sm border border-slate-50">
<div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">schedule</span>
</div>
<div class="flex-1">
<p class="text-lg font-semibold text-slate-800">Pending Tasks</p>
</div>
<span class="text-xl font-bold text-slate-400">1</span>
</div>
</div>
</section>
</main>
<nav class="sticky bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 py-3 flex justify-between items-center pb-8">
<a class="flex flex-col items-center gap-1 text-kirana-green" href="#">
<span class="material-symbols-outlined text-3xl filled-icon">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined text-3xl">gavel</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Auctions</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined text-3xl">list_alt</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Tasks</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined text-3xl">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
</a>
</nav>

</body></html>
