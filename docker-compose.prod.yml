services:
  postgres:
    image: postgres:16-alpine
    container_name: shelfbidder-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - shelfbidder-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_AWS_REGION: ${NEXT_PUBLIC_AWS_REGION}
        NEXT_PUBLIC_PHOTO_BUCKET: ${NEXT_PUBLIC_PHOTO_BUCKET}
        NEXT_PUBLIC_PHOTO_BUCKET_NAME: ${NEXT_PUBLIC_PHOTO_BUCKET_NAME}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    container_name: shelfbidder-app
    env_file:
      - ${APP_ENV_FILE:-.env.ec2}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shelfbidder-network
    restart: unless-stopped

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: studio
    container_name: shelfbidder-prisma-studio
    profiles:
      - tools
    env_file:
      - ${APP_ENV_FILE:-.env.ec2}
    environment:
      PRISMA_ENV_FILE: ${APP_ENV_FILE:-.env.ec2}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PRISMA_STUDIO_PORT:-5555}:5555"
    networks:
      - shelfbidder-network
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    container_name: shelfbidder-nginx
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_TEMPLATE_PATH:-./infrastructure/nginx/default.https.conf.template}:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shelfbidder-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - shelfbidder-network

volumes:
  postgres_data:
    driver: local
  certbot_www:
    driver: local
  letsencrypt:
    driver: local

networks:
  shelfbidder-network:
    driver: bridge
