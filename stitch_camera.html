<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d452",
                        "primary-dark": "#0eb847",
                        "background-light": "#FFFFFF",
                        "kirana-black": "#1A1C1E",
                    },
                    fontFamily: {
                        "sans": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "round-twelve": "12px",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Lexend", sans-serif;
                @apply bg-background-light text-kirana-black;
            }
        }
        .camera-viewfinder {
            background-image: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuA3l8ZeAV8ebZ788HlmorfKUnX80Azy_Veki0-9npFiQZT-1PYRICyIzwuIGM1KkkOI4YMRYriXHvTsgVNJmFPyPn765fJDRDKg2rn3IiBjqwfR68G9PlrZ76vqARkc11Dg34HeCzZBsPw9bp7ZFJKiCM2FjtzXcqJIxAZ8chRAhZuFSmwVIVe2soh-yhfXZz8TfLGauUxjzh7xYeUG1cD3COKovzKyUG_NudE9mf_RwzDfT8GXseaAOIxIKQ6GJ6IdR5eNmU61A3M);
        }
        .rounded-twelve {
            border-radius: 12px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<div class="relative h-[68%] w-full bg-slate-900 camera-viewfinder bg-cover bg-center">
<div class="h-12 w-full"></div>
<div class="absolute top-0 left-0 right-0 flex items-center p-5 bg-gradient-to-b from-black/50 to-transparent">
<button class="flex items-center justify-center rounded-twelve size-10 bg-white/20 backdrop-blur-md text-white border border-white/30">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<div class="ml-4">
<h1 class="text-white font-semibold text-lg">Shelf Scan</h1>
<p class="text-white/80 text-xs font-light">Inventory Audit Mode</p>
</div>
</div>
<div class="absolute inset-0 flex items-center justify-center p-12 pointer-events-none">
<div class="w-full h-full border-2 border-white/50 border-dashed rounded-twelve flex flex-col items-center justify-center">
<div class="bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/20">
<p class="text-white text-xs font-medium">Position product in frame</p>
</div>
</div>
</div>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-3">
<button class="flex items-center justify-center rounded-twelve size-11 bg-black/30 backdrop-blur-md text-white border border-white/10">
<span class="material-symbols-outlined">flash_on</span>
</button>
<button class="flex items-center justify-center rounded-twelve size-11 bg-black/30 backdrop-blur-md text-white border border-white/10">
<span class="material-symbols-outlined">grid_on</span>
</button>
</div>
</div>
<div class="relative flex-1 flex flex-col bg-white -mt-6 rounded-t-[24px] shadow-[0_-8px_30px_rgba(0,0,0,0.12)] z-20 px-6 pt-6">
<div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
<div class="flex flex-col flex-1">
<div class="text-center mb-6">
<span class="inline-block px-3 py-1 bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest rounded-full mb-2">Live Verification</span>
<h2 class="text-kirana-black text-xl font-bold">Do you have Coke stock?</h2>
</div>
<div class="flex w-full gap-4 mb-8">
<button class="flex-1 flex items-center justify-center gap-3 bg-primary py-4 rounded-twelve text-white shadow-lg shadow-primary/30 active:scale-95 transition-all">
<span class="material-symbols-outlined font-bold">check</span>
<span class="text-base font-bold">Yes</span>
</button>
<button class="flex-1 flex items-center justify-center gap-3 bg-slate-100 py-4 rounded-twelve text-slate-600 active:scale-95 transition-all">
<span class="material-symbols-outlined font-bold">close</span>
<span class="text-base font-bold">No</span>
</button>
</div>
<div class="mt-auto flex items-center justify-between pb-8">
<button class="flex flex-col items-center gap-1.5 group">
<div class="size-10 flex items-center justify-center rounded-twelve bg-slate-50 text-slate-400 group-active:bg-slate-100">
<span class="material-symbols-outlined text-2xl">photo_library</span>
</div>
<span class="text-[10px] font-semibold text-slate-400">ALBUM</span>
</button>
<div class="relative">
<div class="absolute -inset-2.5 border-2 border-primary/20 rounded-full"></div>
<button class="relative flex items-center justify-center rounded-full size-20 bg-primary text-white shadow-[0_8px_20px_rgba(17,212,82,0.4)] active:scale-90 transition-all">
<div class="size-[68px] border-2 border-white/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">photo_camera</span>
</div>
</button>
</div>
<button class="flex flex-col items-center gap-1.5 group">
<div class="size-10 flex items-center justify-center rounded-twelve bg-slate-50 text-slate-400 group-active:bg-slate-100">
<span class="material-symbols-outlined text-2xl">history</span>
</div>
<span class="text-[10px] font-semibold text-slate-400">LOGS</span>
</button>
</div>
</div>
</div>
<div class="bg-white flex justify-center pb-2">
<div class="w-32 h-1.5 bg-slate-200 rounded-full"></div>
</div>
</div>

</body></html>
