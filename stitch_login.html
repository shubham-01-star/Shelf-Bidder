<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "kirana-green": "#11d452",
                        "brand-dark": "#0a2e16",
                        "neutral-soft": "#f9fafb",
                    },
                    fontFamily: {
                        sans: ["Lexend", "sans-serif"],
                    },
                    borderRadius: {
                        "round-twelve": "12px",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-white font-sans text-brand-dark antialiased;
            }
        }
        .ios-status-bar {
            height: 44px;
        }
    </style>
<title>Shelf-Bidder Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<div class="relative flex min-h-screen w-full max-w-[430px] flex-col bg-white overflow-hidden mx-auto shadow-sm">
<div class="ios-status-bar w-full"></div>
<div class="flex flex-col items-center pt-12 pb-10">
<div class="bg-[#11d452]/10 p-5 rounded-round-twelve mb-5 border border-[#11d452]/20">
<span class="material-symbols-outlined text-[#11d452] text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 600">
                    storefront
                </span>
</div>
<h2 class="text-[#11d452] text-2xl font-bold tracking-tight">Shelf-Bidder</h2>
</div>
<div class="flex-1 px-8">
<div class="mb-12">
<h1 class="text-brand-dark text-3xl font-bold leading-tight mb-3">Welcome!</h1>
<p class="text-slate-500 text-lg font-light leading-snug">Enter your mobile number to get started</p>
</div>
<div class="group relative flex items-center bg-neutral-soft border-2 border-slate-100 rounded-round-twelve p-1.5 focus-within:border-[#11d452] focus-within:bg-white transition-all duration-200">
<div class="flex items-center justify-center px-4 border-r-2 border-slate-200 py-4">
<span class="text-xl font-bold text-brand-dark">+91</span>
</div>
<div class="flex-1">
<input class="w-full bg-transparent border-none focus:ring-0 text-2xl font-semibold tracking-widest p-4 text-brand-dark placeholder:text-slate-300" maxlength="10" placeholder="98765 43210" type="tel"/>
</div>
</div>
<p class="mt-6 text-center text-xs text-slate-400 px-6 leading-relaxed">
                By continuing, you agree to our <span class="text-brand-dark font-medium underline">Terms of Service</span> and <span class="text-brand-dark font-medium underline">Privacy Policy</span>.
            </p>
</div>
<div class="px-8 pb-12 w-full">
<button class="w-full bg-[#11d452] text-white text-xl font-bold py-5 rounded-round-twelve transition-all active:scale-[0.97] shadow-lg shadow-[#11d452]/30 flex items-center justify-center gap-3">
                Get OTP
                <span class="material-symbols-outlined font-bold">
                    arrow_forward
                </span>
</button>
<div class="mt-10 flex justify-center items-center gap-2 text-slate-400">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-[0.15em]">Secure Kirana Network</span>
</div>
</div>
<div class="absolute top-0 left-0 w-full h-80 -z-10 bg-gradient-to-b from-[#11d452]/5 to-transparent"></div>
</div>

</body></html>
